<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Formulario</title>

 <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body class="bg-dark bg-gradient">
    <div class="container py-5"> 
        <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="card shadow-lg rounded-4">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 text-primary fw-bold">Formulario de Contacto</h3>
            </div>
            </div>
        </div>
        </div>
        <form>
            <div class="row">
            <div class="col-12 col-md-6 mb-3">
                <label class="form-label text-white">Nombre</label>
                <input type="text" class="form-control">
            </div>

            <div class="col-12 col-md-6 mb-3">
                <label class="form-label text-white">Correo</label>
                <input type="email" class="form-control">
            </div>
            </div>
            <textarea class="form-control" rows="5"></textarea>
        </form>
        <div class="row mt-3">
        <div class="col-12 col-md-6 mb-3">
            <label class="form-label text-white">Estado civil</label>
        </div>
        <div class="col-12 col-md-6 mb-3">
            <label class="form-label text-white">País</label>
        </div>
        
        </div>
    </div>
</body>
</html>
